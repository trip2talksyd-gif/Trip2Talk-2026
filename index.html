<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trip2Talk" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#13201a" />
    <title>Trip2Talk V5</title>
    <script>
      // Recover from a stale service worker that pins a broken white-screen build.
      (function () {
        var KEY = 't2t_sw_recovery_v2'
        if (!('serviceWorker' in navigator)) return
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root')
            if (root && root.childNodes.length > 0) return
            if (sessionStorage.getItem(KEY)) return
            sessionStorage.setItem(KEY, '1')
            Promise.all([
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister() }))
              }),
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k) }))
              }),
            ]).then(function () {
              location.reload()
            })
          }, 2500)
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
