    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=Prompt:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&family=Caveat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Recover from a stale service worker that pins a broken white-screen build.
      (function () {
        var KEY = 't2t_sw_recovery_v2'
        if (!('serviceWorker' in navigator)) return
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root')
            if (root && root.childNodes.length > 0) return
            if (sessionStorage.getItem(KEY)) return
            sessionStorage.setItem(KEY, '1')
            Promise.all([
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister() }))
              }),
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k) }))
              }),
            ]).then(function () {
              location.reload()
            })
          }, 2500)
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
